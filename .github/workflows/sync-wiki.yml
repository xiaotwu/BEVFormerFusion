name: Sync doc/ to GitHub Wiki

on:
  push:
    branches: ["master"]
    paths:
      - "doc/**"
  workflow_dispatch: {}

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone wiki repo (must be .wiki.git)
        env:
          WIKI_PAT: ${{ secrets.BFF_WIKI_SYNC }}
        run: |
          set -euxo pipefail
          rm -rf wiki

          WIKI_URL="https://x-access-token:${WIKI_PAT}@github.com/${{ github.repository }}.wiki.git"
          git clone "${WIKI_URL}" wiki

          # SAFETY: ensure origin points to the wiki repo, not the main repo
          cd wiki
          ORIGIN_URL="$(git remote get-url origin)"
          echo "origin = ${ORIGIN_URL}"
          case "${ORIGIN_URL}" in
            *".wiki.git") ;;
            *) echo "ERROR: origin is not a .wiki.git repo! Refusing to push."; exit 1 ;;
          esac
          cd ..

      - name: Sync doc/ to wiki (do NOT overwrite Home.md)
        run: |
          set -euxo pipefail
          rsync -av --delete \
            --exclude 'Home.md' \
            doc/ wiki/

      - name: (Optional) Generate _Sidebar.md from doc/ filenames
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import os, re

          wiki_dir = "wiki"
          md_files = []
          for f in os.listdir(wiki_dir):
            if f.endswith(".md") and f not in ("Home.md", "_Sidebar.md", "_Footer.md"):
              md_files.append(f)

          def sort_key(name: str):
            m = re.match(r"^(\d+)-", name)
            if m:
              return (0, int(m.group(1)), name)
            if name.startswith("appendix"):
              return (2, 0, name)
            return (1, 0, name)

          md_files.sort(key=sort_key)

          lines = []
          for f in md_files:
            page = f[:-3]
            title = page.replace("-", " ")
            if f.startswith("appendix") and "---" not in lines:
              lines += ["", "---", ""]
            lines.append(f"- [[{title}|{page}]]")

          with open(os.path.join(wiki_dir, "_Sidebar.md"), "w", encoding="utf-8") as w:
            w.write("\n".join(lines).strip() + "\n")
          print("Generated _Sidebar.md with", len(md_files), "entries")
          PY

      - name: Commit & push changes to wiki
        run: |
          set -euxo pipefail
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git commit -m "Sync doc/ to wiki"
          git push origin HEAD:master