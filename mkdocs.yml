site_name: BEVFormerFusion Docs
site_description: Research-grade documentation for BEVFormerFusion and its BEVFormer-relative modifications
repo_url: https://github.com/xiaotwu/BEVFormerFusion
repo_name: xiaotwu/BEVFormerFusion
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - BEVFormer Comparison: bevformer_comparison.md
  - Experiments: experiments.md
  - Usage: usage.md
  - API Reference: api_reference.md

extra_css:
  - assets/stylesheets/research.css

extra_javascript:
  - assets/javascripts/metrics.js

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
